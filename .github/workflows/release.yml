name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  issues: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: |
            {
              "template": "# Aegis v{{releaseName}}\n\n{{CHANGELOG}}\n\n**Full Changelog**: [${{ github.repository }}/compare/{{previousTag}}...{{releaseName}}](${{ github.server_url }}/${{ github.repository }}/compare/{{previousTag}}...{{releaseName}})",
              "categories": [
                {"title": "🚀 Features", "labels": ["feat", "feature", "enhancement"]},
                {"title": "🐛 Bug Fixes", "labels": ["fix", "bug"]},
                {"title": "📖 Documentation", "labels": ["docs", "documentation"]},
                {"title": "🧰 Maintenance", "labels": ["chore", "refactor", "ci"]},
                {"title": "✅ Tests", "labels": ["test"]}
              ],
              "label_extractor": [
                {"pattern": "^(\\w+)\\(.*\\):", "target": "$1"},
                {"pattern": "^(\\w+):", "target": "$1"}
              ],
              "pr_template": "- #{{PR_NUMBER}} — {{TITLE}}",
              "transform_labels": "lowercase"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          name: Aegis ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: |
            LICENSE
            README.md

  docker:
    name: Build & Push Release Image
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            REVISION=${{ github.sha }}
